dataDir: ~/.agent-orchestrator
worktreeDir: ~/.worktrees
port: 3000

defaults:
  runtime: tmux
  agent: claude-code
  workspace: worktree
  notifiers: [webhook]

projects:
  ops-homelab:
    name: Homelab Ops
    path: /root/repos/homelab-ops
    repo: phj6688/homelab-ops
    defaultBranch: main
    agentConfig:
      permissions: default
    agentRules: |
      This is an operations/infrastructure task, not feature development.
      Do not open a PR unless explicitly asked.
      Report findings as a structured summary.

  cortex-v3:
    name: Cortex V3
    path: /root/repos/cortex-v3
    repo: phj6688/cortex
    defaultBranch: master
    agentConfig:
      permissions: default
    agentRules: |
      Read CLAUDE.md in the project root first.
      TypeScript strict mode. No any. No ts-ignore.
      Run pnpm typecheck after every change. Zero errors required.
      Run pnpm test before committing. Zero failures required.
      Use prepared statements for all SQL queries.
      State transitions must go through task-machine.ts.
      Every DB mutation writes to events table.
      SSE routes use reply.hijack() — add CORS headers manually.
      Commit with conventional commits: feat:, fix:, refactor:
      Push to the session branch when done.

notifiers:
  webhook:
    plugin: webhook
    to: http://cortex-v3:3481/api/ao-events

notificationRouting:
  urgent: [webhook]
  action: [webhook]
  warning: [webhook]
  info: [webhook]
