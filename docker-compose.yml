services:
  cortex-v3:
    build:
      context: .
      dockerfile: Dockerfile
    ports: ["3481:3481"]
    environment:
      DATABASE_PATH: /data/cortex.db
      AO_BASE_URL: http://agent-orchestrator:3000
      AO_CONFIG_PATH: /ao-config/agent-orchestrator.yaml
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PORT: "3481"
      NODE_ENV: production
      LOG_LEVEL: info
    volumes:
      - cortex-v3-data:/data
      - ./ao-config:/ao-config
    depends_on:
      agent-orchestrator:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3481/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  agent-orchestrator:
    build:
      context: ./ao-service
      dockerfile: Dockerfile
    ports: ["3100:3000"]
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    volumes:
      - ./ao-config/agent-orchestrator.yaml:/app/agent-orchestrator.yaml
      - ao-data:/home/ao-agent/.agent-orchestrator
      - ao-worktrees:/home/ao-agent/.worktrees
      - /home/lumo/cortex-v3:/home/ao-agent/repos/cortex-v3
      - /home/lumo/.ssh:/root/.ssh:ro
      - /home/peyman/.claude:/tmp/claude-auth:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/sessions"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  cortex-v3-data:
  ao-data:
  ao-worktrees:
